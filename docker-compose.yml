services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=development
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  admin-frontend:
    build:
      context: .
      dockerfile: admin-frontend/Dockerfile
    ports:
      - "5174:80"
    depends_on:
      - backend
    restart: unless-stopped
