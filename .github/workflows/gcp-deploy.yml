name: Build & Deploy to GCP Cloud Run
on:
  push:
    branches:
      - main

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  FRONTEND_SERVICE: ${{ secrets.FRONTEND_SERVICE_NAME }}
  BACKEND_SERVICE: ${{ secrets.BACKEND_SERVICE_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure gcloud and Docker auth
        run: |
          gcloud --quiet config set project $GCP_PROJECT
          gcloud --quiet config set run/region $GCP_REGION
          gcloud auth configure-docker --quiet

      - name: Build & push frontend image
        run: |
          docker build -t gcr.io/$GCP_PROJECT/frontend:${{ github.sha }} -f frontend/Dockerfile .
          docker push gcr.io/$GCP_PROJECT/frontend:${{ github.sha }}

      - name: Build & push backend image
        run: |
          docker build -t gcr.io/$GCP_PROJECT/backend:${{ github.sha }} -f backend/Dockerfile .
          docker push gcr.io/$GCP_PROJECT/backend:${{ github.sha }}

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy $BACKEND_SERVICE \
            --image gcr.io/$GCP_PROJECT/backend:${{ github.sha }} \
            --platform managed \
            --region $GCP_REGION \
            --allow-unauthenticated \
            --quiet

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy $FRONTEND_SERVICE \
            --image gcr.io/$GCP_PROJECT/frontend:${{ github.sha }} \
            --platform managed \
            --region $GCP_REGION \
            --allow-unauthenticated \
            --quiet
